<h2>Custom Tax Deduction Dialog</h2>
<p class="subtitle">For any property - manual description and amount</p>

<div class="mockup" style="max-width: 450px; margin: 0 auto;">
  <div class="mockup-header">Add Custom Tax Deduction - 2025</div>
  <div class="mockup-body" style="padding: 20px;">
    <div style="margin-bottom: 16px;">
      <label style="display: block; font-size: 12px; color: #666; margin-bottom: 4px;">Property</label>
      <div style="padding: 8px 12px; background: #f5f5f5; border-radius: 4px;">Vuokra-asunto Töölö</div>
    </div>

    <div style="margin-bottom: 16px;">
      <label style="display: block; font-size: 12px; color: #666; margin-bottom: 4px;">Description *</label>
      <input class="mock-input" placeholder="e.g., Travel to property inspection" style="width: 100%;">
    </div>

    <div style="margin-bottom: 20px;">
      <label style="display: block; font-size: 12px; color: #666; margin-bottom: 4px;">Amount *</label>
      <div style="display: flex; align-items: center;">
        <input class="mock-input" placeholder="0.00" style="flex: 1; text-align: right;">
        <span style="margin-left: 8px; color: #666;">€</span>
      </div>
    </div>

    <div style="display: flex; justify-content: flex-end; gap: 12px;">
      <button class="mock-button">Cancel</button>
      <button class="mock-button" style="background: #1976d2; color: white;">Add Deduction</button>
    </div>
  </div>
</div>

<p style="text-align: center; margin-top: 20px; color: #666;">
  Available for all properties (not just Airbnb). Does this work?
